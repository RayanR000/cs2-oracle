name: Daily Trend Analysis

on:
  schedule:
    # Every day at 2:00 AM UTC (10:00 PM EDT previous day) — 2h buffer after aggregator-update finishes
    - cron: '0 2 * * *'
  workflow_dispatch: # Allow manual trigger

defaults:
  run:
    shell: bash

permissions:
  issues: write
  contents: read

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Checkout price archive
        uses: actions/checkout@v4
        with:
          ref: data-archive
          path: archive
          fetch-depth: 1

      - name: Link price-archive
        run: ln -s $PWD/archive/price-archive price-archive

      - name: Run trend analysis
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          set -o pipefail
          echo "📊 Starting daily trend analysis..."
          python scripts/run_task.py trends 2>&1 | tee analysis.log

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-logs-${{ github.run_id }}
          path: backend/analysis.log
          retention-days: 30
