name: Daily Trend Analysis

on:
  schedule:
    # Every day at 3:00 AM UTC (10 PM EST previous day)
    - cron: '0 3 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run trend analysis
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "📊 Starting daily trend analysis..."
          python scripts/analyze_trends.py 2>&1 | tee analysis.log
          EXIT_CODE=$?
          echo "✅ Trend analysis completed with exit code: $EXIT_CODE"

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-logs-${{ github.run_id }}
          path: backend/analysis.log
          retention-days: 7
