name: Backtest Accuracy

on:
  # Chain off forecast generation — the backtest needs mature forecasts
  # (forecasts made N days ago where N >= horizon) to evaluate.
  workflow_run:
    workflows: ["Price Forecast"]
    types: [completed]
  workflow_dispatch:
    inputs:
      type:
        description: 'Backtest type (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - forecast
          - trend_direction
          - opportunity

defaults:
  run:
    shell: bash

permissions:
  issues: write

jobs:
  backtest:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run backtesting
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          if [ -n "${{ inputs.type }}" ]; then
            echo "Running backtest for: ${{ inputs.type }}"
            python scripts/backtest_accuracy.py --type ${{ inputs.type }} 2>&1 | tee backtest.log
          else
            echo "Running full backtest (all types)..."
            python scripts/backtest_accuracy.py 2>&1 | tee backtest.log
          fi

      - name: Notify on failure
        if: failure() && github.event_name == 'workflow_run'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Upload backtest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-logs-${{ github.run_id }}
          path: backend/backtest.log
          retention-days: 30
