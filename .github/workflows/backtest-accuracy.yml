name: Backtest Accuracy

on:
  # Daily: evaluate live forecasts & recent trend/opportunity signals
  workflow_run:
    workflows: ["Price Forecast"]
    types: [completed]
  # Weekly (Sunday): run full historical walk-forward through parquet archive
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      type:
        description: 'Backtest type (leave empty for all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - forecast
          - trend_direction
          - opportunity
          - historical

defaults:
  run:
    shell: bash

permissions:
  issues: write

jobs:
  backtest:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ -n "${{ inputs.type }}" ]; then
            echo "type=${{ inputs.type }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "7" ]; then
            # Sunday: include full historical walk-forward (computationally expensive)
            echo "type=historical" >> $GITHUB_OUTPUT
          else
            echo "type=live" >> $GITHUB_OUTPUT
          fi

      - name: Run live backtesting (forecast + trend + opportunity)
        if: steps.mode.outputs.type == 'live' || steps.mode.outputs.type == 'full'
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "Running live backtest (forecast, trend_direction, opportunity)..."
          python scripts/backtest_accuracy.py --type forecast 2>&1 | tee backtest.log
          python scripts/backtest_accuracy.py --type trend_direction 2>&1 | tee -a backtest.log
          python scripts/backtest_accuracy.py --type opportunity 2>&1 | tee -a backtest.log

      - name: Run historical walk-forward backtest (weekly)
        if: steps.mode.outputs.type == 'historical'
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "Running historical walk-forward backtest..."
          python scripts/backtest_accuracy.py --type historical 2>&1 | tee backtest.log

      - name: Run single-type backtest (manual dispatch)
        if: steps.mode.outputs.type != 'live' && steps.mode.outputs.type != 'historical'
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "Running backtest for: ${{ steps.mode.outputs.type }}"
          python scripts/backtest_accuracy.py --type ${{ steps.mode.outputs.type }} 2>&1 | tee backtest.log

      - name: Notify on failure
        if: failure() && github.event_name == 'workflow_run'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Upload backtest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-logs-${{ github.run_id }}
          path: backend/backtest.log
          retention-days: 30
