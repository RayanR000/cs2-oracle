name: Event Correlation Analysis

on:
  schedule:
    # Every Sunday at 2:00 AM UTC (Sunday after daily trend analysis has run multiple times)
    - cron: '0 2 * * 0'
  workflow_dispatch: # Allow manual trigger

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run event correlation analysis
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "📊 Starting event correlation analysis..."
          python scripts/event_analyzer.py 2>&1 | tee event_analysis.log
          EXIT_CODE=$?
          echo "✅ Event analysis completed with exit code: $EXIT_CODE"

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: event-analysis-logs-${{ github.run_id }}
          path: backend/event_analysis.log
          retention-days: 7
