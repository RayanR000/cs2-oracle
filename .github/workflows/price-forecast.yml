name: Price Forecast

on:
  # Chain off trend analysis instead of a separate cron: forecast features
  # come from daily_analysis, and GitHub cron delays (often 1-3h) could
  # otherwise run the forecast before the day's analysis has been written.
  workflow_run:
    workflows: ["Daily Trend Analysis"]
    types: [completed]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Forecast mode'
        required: true
        default: 'predict-only'
        type: choice
        options:
          - predict-only
          - train-only
          - full

defaults:
  run:
    shell: bash

permissions:
  issues: write
  contents: write

jobs:
  forecast:
    # Skip when the upstream trend analysis failed — its daily_analysis
    # output is this job's feature input.
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%u)" = "1" ]; then
            # Monday: full retrain + predict
            echo "mode=full" >> $GITHUB_OUTPUT
          else
            echo "mode=predict-only" >> $GITHUB_OUTPUT
          fi

      - name: Run ML price forecasting
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "🔮 Mode: ${{ steps.mode.outputs.mode }}"
          set -o pipefail
          case "${{ steps.mode.outputs.mode }}" in
            predict-only)
              python scripts/forecast_prices.py --predict-only 2>&1 | tee forecast.log
              ;;
            train-only)
              python scripts/forecast_prices.py --train-only 2>&1 | tee forecast.log
              ;;
            full)
              python scripts/forecast_prices.py 2>&1 | tee forecast.log
              ;;
          esac

      - name: Commit retrained models
        if: steps.mode.outputs.mode == 'full'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/models/saved_models/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update ML models [skip ci]"
          git push

      - name: Notify on failure
        if: failure() && github.event_name == 'workflow_run'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Run accuracy backtesting
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "📊 Running forecast accuracy backtest..."
          python scripts/backtest_accuracy.py --type forecast 2>&1 | tee -a backtest.log

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: forecast-logs-${{ github.run_id }}
          path: |
            backend/forecast.log
            backend/backtest.log
          retention-days: 30
