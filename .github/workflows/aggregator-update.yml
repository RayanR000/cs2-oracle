name: Aggregator Market Update (17k Items)

on:
  schedule:
    # Every 6 hours — runs 2h before daily trend analysis (03:00 UTC) and forecast (04:00 UTC)
    # 9:00 PM EDT   = 01:00 UTC (previous day)
    # 5:00 AM EDT   = 09:00 UTC
    # 11:00 AM EDT  = 15:00 UTC
    # 5:00 PM EDT   = 21:00 UTC
    - cron: '0 1,9,15,21 * * *'
  workflow_dispatch: # Allow manual trigger

defaults:
  run:
    shell: bash

permissions:
  issues: write
  contents: read

jobs:
  collect-data:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Aggregator Task
        working-directory: ./backend
        env:
          DATABASE_URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          ENVIRONMENT: production
          DEBUG: false
        run: |
          echo "🚀 Starting aggregator market update..."
          python scripts/run_task.py aggregate 2>&1 | tee aggregator.log

      - name: Notify on failure
        if: failure() && github.event_name == 'schedule'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "[${{ github.workflow }}] Failed - $(date +%F)" \
            --body "Workflow **${{ github.workflow }}** failed.

          Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          Branch: ${{ github.ref_name }}
          Trigger: ${{ github.event_name }}" \
            --label "automation" 2>/dev/null || true

      - name: Upload aggregator logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aggregator-logs-${{ github.run_id }}
          path: backend/aggregator.log
          retention-days: 30
